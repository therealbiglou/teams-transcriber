target-version = "py311"
line-length = 100

[lint]
select = [
    "E", "F", "W",   # pycodestyle / pyflakes
    "I",             # isort
    "B",             # bugbear
    "UP",            # pyupgrade
    "SIM",           # simplify
    "RUF",           # ruff-specific
]
ignore = ["E501"]  # line length handled by formatter

[lint.per-file-ignores]
"__init__.py" = ["F401"]  # re-exports are intentional public surface

[format]
quote-style = "double"
